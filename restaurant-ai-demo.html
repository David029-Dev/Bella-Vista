<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bella Vista AI Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0a00; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.3); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    /* ============================================================
       TO CUSTOMIZE FOR A NEW RESTAURANT:
       1. Change RESTAURANT_NAME
       2. Change ASSISTANT_NAME
       3. Update HOURS
       4. Update the MENU section inside SYSTEM_PROMPT
       5. Update FAQs inside SYSTEM_PROMPT
       That's it! Save and upload to GitHub.
    ============================================================ */

    const RESTAURANT_NAME = "Bella Vista";
    const ASSISTANT_NAME  = "Bella";
    const HOURS = "Mon–Thu 5pm–10pm, Fri–Sat 5pm–11pm, Sun 4pm–9pm";

    const SYSTEM_PROMPT = `You are ${ASSISTANT_NAME}, a warm and efficient AI assistant for "${RESTAURANT_NAME}" — an upscale Italian restaurant. You help customers with:

1. **Menu inquiries**: Our menu includes:
   - Starters: Bruschetta ($12), Burrata Salad ($16), Calamari Fritti ($14)
   - Pasta: Tagliatelle al Ragù ($24), Cacio e Pepe ($22), Lobster Linguine ($38)
   - Mains: Grilled Branzino ($42), Veal Milanese ($44), Ribeye Fiorentina ($58)
   - Desserts: Tiramisu ($12), Panna Cotta ($11), Cannoli ($10)
   - We offer vegetarian, vegan, and gluten-free options on request.

2. **Reservations**:
   - Hours: ${HOURS}
   - Tables for 2–12 guests. Ask for name, date, time, party size, and special requests.
   - Confirm with a reservation summary.

3. **Orders** (takeout):
   - Ask what they'd like to order, confirm items & quantities, give total, confirm pickup time (30–45 min).

4. **FAQs**:
   - Parking: Complimentary valet on weekends
   - Dress code: Smart casual
   - Private dining: Available for groups of 10+
   - Gift cards: Available online or in-person

Be warm, concise, and professional. Use a touch of Italian flair (e.g., "Perfetto!", "Grazie!"). Never make up information not listed above.`;

    function App() {
      const [messages, setMessages] = React.useState([
        {
          role: "assistant",
          content: `Benvenuti! 🌿 I'm ${ASSISTANT_NAME}, your personal assistant at ${RESTAURANT_NAME}. I can help you explore our menu, make a reservation, or place a takeout order. How can I assist you this evening?`,
        },
      ]);
      const [input, setInput] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const bottomRef = React.useRef(null);
      const inputRef = React.useRef(null);

      React.useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      const sendMessage = async () => {
        const text = input.trim();
        if (!text || loading) return;
        setInput("");
        const newMessages = [...messages, { role: "user", content: text }];
        setMessages(newMessages);
        setLoading(true);
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM_PROMPT,
              messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
            }),
          });
          const data = await response.json();
          const reply = data.content?.map((b) => b.text).join("") || "Sorry, I couldn't process that.";
          setMessages([...newMessages, { role: "assistant", content: reply }]);
        } catch {
          setMessages([...newMessages, { role: "assistant", content: "Apologies, something went wrong. Please try again." }]);
        } finally {
          setLoading(false);
          inputRef.current?.focus();
        }
      };

      const quickActions = ["📋 View Menu", "📅 Make Reservation", "🛍️ Takeout Order", "❓ FAQs"];

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(135deg, #1a0a00 0%, #2d1200 40%, #1a0a00 100%)",
          fontFamily: "'Georgia', serif",
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "20px",
        }}>
          <div style={{
            position: "fixed", inset: 0, opacity: 0.04,
            backgroundImage: "repeating-linear-gradient(45deg, #c9a227 0, #c9a227 1px, transparent 0, transparent 50%)",
            backgroundSize: "20px 20px", pointerEvents: "none",
          }} />

          <div style={{
            width: "100%", maxWidth: "480px",
            display: "flex", flexDirection: "column",
            borderRadius: "20px", overflow: "hidden",
            boxShadow: "0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,162,39,0.2)",
          }}>
            {/* Header */}
            <div style={{
              background: "linear-gradient(135deg, #1c0d00, #2e1800)",
              borderBottom: "1px solid rgba(201,162,39,0.3)",
              padding: "24px 28px 20px", position: "relative", overflow: "hidden",
            }}>
              <div style={{
                position: "absolute", top: -20, right: -20, width: 120, height: 120,
                borderRadius: "50%", background: "radial-gradient(circle, rgba(201,162,39,0.15), transparent 70%)",
              }} />
              <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
                <div style={{
                  width: 52, height: 52, borderRadius: "50%",
                  background: "linear-gradient(135deg, #c9a227, #8b6914)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 22, boxShadow: "0 4px 15px rgba(201,162,39,0.4)", flexShrink: 0,
                }}>🌿</div>
                <div>
                  <div style={{ color: "#c9a227", fontSize: "11px", letterSpacing: "3px", textTransform: "uppercase", marginBottom: 3 }}>{RESTAURANT_NAME}</div>
                  <div style={{ color: "#f5ead0", fontSize: "20px", fontWeight: "bold", lineHeight: 1 }}>{ASSISTANT_NAME}</div>
                  <div style={{ color: "rgba(245,234,208,0.5)", fontSize: "11px", marginTop: 2 }}>Your personal dining assistant</div>
                </div>
                <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4caf50", boxShadow: "0 0 6px #4caf50" }} />
                  <span style={{ color: "rgba(245,234,208,0.5)", fontSize: "11px" }}>Online</span>
                </div>
              </div>
            </div>

            {/* Quick Actions */}
            <div style={{
              background: "#1c0d00", padding: "12px 16px",
              borderBottom: "1px solid rgba(201,162,39,0.1)",
              display: "flex", gap: 8, flexWrap: "wrap",
            }}>
              {quickActions.map((a) => (
                <button key={a} onClick={() => { setInput(a.replace(/^.\s/, "")); inputRef.current?.focus(); }}
                  style={{
                    background: "rgba(201,162,39,0.1)", border: "1px solid rgba(201,162,39,0.25)",
                    borderRadius: "20px", padding: "5px 12px", color: "#c9a227",
                    fontSize: "12px", cursor: "pointer", fontFamily: "Georgia, serif",
                  }}
                  onMouseEnter={e => e.target.style.background = "rgba(201,162,39,0.2)"}
                  onMouseLeave={e => e.target.style.background = "rgba(201,162,39,0.1)"}
                >{a}</button>
              ))}
            </div>

            {/* Messages */}
            <div style={{
              overflowY: "auto", padding: "20px 16px",
              background: "#160800", minHeight: "380px", maxHeight: "420px",
              display: "flex", flexDirection: "column", gap: "14px",
            }}>
              {messages.map((m, i) => (
                <div key={i} style={{
                  display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start",
                  alignItems: "flex-end", gap: 8,
                }}>
                  {m.role === "assistant" && (
                    <div style={{
                      width: 28, height: 28, borderRadius: "50%", flexShrink: 0,
                      background: "linear-gradient(135deg, #c9a227, #8b6914)",
                      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13,
                    }}>🌿</div>
                  )}
                  <div style={{
                    maxWidth: "75%",
                    background: m.role === "user" ? "linear-gradient(135deg, #c9a227, #a07d1a)" : "rgba(255,255,255,0.05)",
                    border: m.role === "user" ? "none" : "1px solid rgba(201,162,39,0.15)",
                    borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                    padding: "10px 14px",
                    color: m.role === "user" ? "#1a0a00" : "#f5ead0",
                    fontSize: "14px", lineHeight: "1.5",
                    fontWeight: m.role === "user" ? "600" : "400",
                    whiteSpace: "pre-wrap",
                  }}>{m.content}</div>
                </div>
              ))}
              {loading && (
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                  <div style={{
                    width: 28, height: 28, borderRadius: "50%",
                    background: "linear-gradient(135deg, #c9a227, #8b6914)",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13,
                  }}>🌿</div>
                  <div style={{
                    background: "rgba(255,255,255,0.05)", border: "1px solid rgba(201,162,39,0.15)",
                    borderRadius: "18px 18px 18px 4px", padding: "12px 16px",
                    display: "flex", gap: 5, alignItems: "center",
                  }}>
                    {[0,1,2].map(i => (
                      <div key={i} style={{
                        width: 7, height: 7, borderRadius: "50%", background: "#c9a227",
                        animation: "bounce 1.2s infinite", animationDelay: `${i * 0.2}s`,
                      }} />
                    ))}
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>

            {/* Input */}
            <div style={{
              background: "#1c0d00", borderTop: "1px solid rgba(201,162,39,0.2)",
              padding: "14px 16px", display: "flex", gap: 10, alignItems: "center",
            }}>
              <input
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && sendMessage()}
                placeholder="Ask about our menu, reservations..."
                style={{
                  flex: 1, background: "rgba(255,255,255,0.05)",
                  border: "1px solid rgba(201,162,39,0.2)", borderRadius: "25px",
                  padding: "10px 18px", color: "#f5ead0", fontSize: "14px",
                  fontFamily: "Georgia, serif", outline: "none",
                }}
                onFocus={e => e.target.style.borderColor = "rgba(201,162,39,0.6)"}
                onBlur={e => e.target.style.borderColor = "rgba(201,162,39,0.2)"}
              />
              <button onClick={sendMessage} disabled={loading || !input.trim()} style={{
                width: 42, height: 42, borderRadius: "50%", border: "none",
                background: input.trim() && !loading ? "linear-gradient(135deg, #c9a227, #8b6914)" : "rgba(201,162,39,0.2)",
                cursor: input.trim() && !loading ? "pointer" : "default",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 17, flexShrink: 0,
                boxShadow: input.trim() && !loading ? "0 4px 15px rgba(201,162,39,0.3)" : "none",
              }}>➤</button>
            </div>

            {/* Footer */}
            <div style={{
              background: "#160800", padding: "8px", textAlign: "center",
              borderTop: "1px solid rgba(201,162,39,0.1)",
            }}>
              <span style={{ color: "rgba(245,234,208,0.25)", fontSize: "10px", letterSpacing: "1px" }}>
                POWERED BY AI • {RESTAURANT_NAME.toUpperCase()}
              </span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
